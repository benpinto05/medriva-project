name: medriva
description: "MEDRIVA - Role based medical app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  http: ^1.6.0
  speech_to_text: ^7.0.0
  flutter_tts: ^3.8.5
  cupertino_icons: ^1.0.8
  file_picker: ^10.3.10   # (you can keep or remove, not needed now)
  url_launcher: ^6.3.2
  flutter_svg: ^2.2.3
  app_links: ^6.1.1
  fl_chart: ^0.68.0
  flutter_pdfview: ^1.3.2
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/roles/docs/
   